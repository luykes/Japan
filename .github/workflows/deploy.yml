name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            git config --global --add safe.directory /opt/japan-travel
            cd /opt/japan-travel
            git pull origin main
            printf "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}\nAUTH_USER=${{ secrets.AUTH_USER }}\nAUTH_PASS=${{ secrets.AUTH_PASS }}\nSESSION_SECRET=${{ secrets.SESSION_SECRET }}\n" > .env.local
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
