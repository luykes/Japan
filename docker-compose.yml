services:
  app:
    build: .
    container_name: japan-travel
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATA_DIR=/data
      - AUTH_USER=${AUTH_USER}
      - AUTH_PASS=${AUTH_PASS}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - checklist_data:/data

volumes:
  checklist_data:
